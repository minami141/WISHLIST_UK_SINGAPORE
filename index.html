<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- 基本的なWebアプリ設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="UK Trip">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    
    <!-- Apple Touch Icon (iOSホーム画面用) - 180x180相当の高解像度SVGデータ -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230f172a'/%3E%3Cpath d='M30 90h120v10H30z' fill='%231e293b'/%3E%3Cpath d='M85 30h10v120H85z' fill='%231e293b'/%3E%3Ccircle cx='90' cy='90' r='35' stroke='%233b82f6' stroke-width='8' fill='none'/%3E%3Cpath d='M90 70v40M70 90h40' stroke='%233b82f6' stroke-width='8' stroke-linecap='round'/%3E%3C/svg%3E?v=2">
    
    <!-- Favicon (ブラウザタブ用) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230f172a'/%3E%3Ccircle cx='50' cy='50' r='25' stroke='%233b82f6' stroke-width='10' fill='none'/%3E%3C/svg%3E?v=2">

    <title>UK Trip Wishlist</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        :root { --sab: env(safe-area-inset-bottom); }

        body { 
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            padding-bottom: calc(5rem + var(--sab));
        }

        /* スタイリング詳細は以前のバージョンを継承 */
        .scroll-text-container { overflow: hidden; white-space: nowrap; position: relative; }
        .scroll-text { display: inline-block; transition: transform 0.3s ease; }
        .animate-scroll { animation: scroll-left 10s linear infinite; padding-right: 50px; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        .modal-base { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); align-items: flex-end; }
        .modal-base.show { display: flex; }
        .modal-content { width: 100%; max-height: 90vh; background: white; border-radius: 2rem 2rem 0 0; padding: 1.5rem 1.5rem calc(1.5rem + var(--sab)); transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); overflow-y: auto; }
        .modal-base.show .modal-content { transform: translateY(0); }
        .expandable-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
        .expandable-content.expanded { max-height: 1000px; }

        .card-accent-food { border-left: 4px solid #f97316; }
        .card-accent-shop { border-left: 4px solid #a855f7; }
        .card-accent-spot { border-left: 4px solid #10b981; }
        .card-accent-museum { border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="text-slate-900">

    <div class="max-w-md mx-auto px-5">
        <!-- Header -->
        <header class="pt-8 pb-4 flex items-center justify-between sticky top-0 bg-[#f8fafc]/80 backdrop-blur-md z-40">
            <div>
                <h1 class="text-2xl font-black tracking-tighter italic text-slate-800 uppercase leading-none">UK TRIP</h1>
                <p class="text-[8px] text-blue-600 font-bold uppercase tracking-[0.3em] mt-1">Honeymoon Wishlist</p>
            </div>
            <button onclick="toggleForm()" id="form-toggle-btn" class="w-10 h-10 bg-slate-900 text-white rounded-xl flex items-center justify-center shadow-lg transition-all active:scale-95">
                <i data-lucide="plus" id="form-toggle-icon" class="w-5 h-5 transition-transform duration-300"></i>
            </button>
        </header>

        <!-- Form & List Container (以降のロジックは変更なし) -->
        <div id="add-form" class="hidden mb-6 bg-white p-5 rounded-[1.5rem] shadow-xl border border-slate-100">
            <!-- 以前のコードと同じため中略可能ですが、動作のために保持 -->
            <div class="space-y-3">
                <div class="relative" id="category-selector-container">
                    <button onclick="toggleCategoryMenu(event)" class="w-full flex items-center justify-between px-4 py-3 bg-slate-50 rounded-xl border border-slate-100 text-xs">
                        <div id="selected-category-display" class="flex items-center gap-2 font-bold"></div>
                        <i data-lucide="chevron-down" class="w-3 h-3 text-slate-400"></i>
                    </button>
                    <div id="category-options" class="hidden absolute top-full left-0 w-full mt-1 bg-white border border-slate-100 rounded-xl shadow-2xl z-50 overflow-hidden"></div>
                </div>
                <input type="text" id="new-name" placeholder="やりたいこと" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-100 text-sm font-bold placeholder:text-slate-300 outline-none">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="new-spot" placeholder="場所" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-100 text-xs font-medium outline-none">
                    <input type="number" id="new-budget" placeholder="予算 (£)" class="w-full px-4 py-3 bg-blue-50/50 rounded-xl border border-blue-100 text-xs font-black text-blue-600 outline-none">
                </div>
                <div class="flex items-center justify-end pt-2">
                    <button onclick="addItem()" class="bg-blue-600 text-white px-8 py-2.5 rounded-xl font-black text-[10px] uppercase tracking-widest active:scale-95">追加する</button>
                </div>
            </div>
        </div>

        <div id="tabs-container" class="flex gap-2 mb-6 overflow-x-auto pb-2 scrollbar-hide -mx-1 px-1"></div>
        <div id="items-list" class="space-y-3"></div>
    </div>

    <!-- Progress UI -->
    <div class="fixed bottom-0 left-0 right-0 p-4 pb-[calc(1rem + var(--sab))] pointer-events-none z-[80]">
        <div class="max-w-md mx-auto bg-white/70 backdrop-blur-xl rounded-2xl p-4 shadow-xl flex items-center justify-between pointer-events-auto border border-white/40">
            <div class="flex items-center gap-4">
                <div class="flex flex-col">
                    <span class="text-[6px] font-black text-slate-400 uppercase tracking-[0.2em]">Progress</span>
                    <span id="progress-percent" class="text-sm font-black italic text-slate-800 leading-none">0%</span>
                </div>
                <div class="w-20 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-blue-500 h-full transition-all duration-700"></div>
                </div>
            </div>
            <div id="total-budget-display" class="text-sm font-black text-slate-800 italic tabular-nums">£0</div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal-base" onclick="closeEditModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="w-12 h-1 bg-slate-100 rounded-full mx-auto mb-6"></div>
            <input type="text" id="modal-edit-name" class="w-full px-4 py-4 bg-slate-50 rounded-xl border border-slate-100 font-bold outline-none mb-4 text-lg">
            <button onclick="saveModalEdit()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black uppercase tracking-widest">保存して閉じる</button>
        </div>
    </div>

    <script>
        // ロジック部分は以前のものをそのまま使用
        let items = JSON.parse(localStorage.getItem('uk_wishlist_v3')) || [];
        let activeTab = 'all';
        let selectedCategory = 'food';
        let expandedId = null;
        let editingItemId = null;

        const categories = [
            { id: 'food', label: 'グルメ', icon: 'utensils', color: 'text-orange-500', bg: 'bg-orange-50', activeBg: 'bg-orange-500' },
            { id: 'shop', label: '買い物', icon: 'shopping-bag', color: 'text-purple-500', bg: 'bg-purple-50', activeBg: 'bg-purple-500' },
            { id: 'spot', label: '観光', icon: 'camera', color: 'text-emerald-500', bg: 'bg-emerald-50', activeBg: 'bg-emerald-500' },
            { id: 'museum', label: '文化', icon: 'landmark', color: 'text-blue-500', bg: 'bg-blue-50', activeBg: 'bg-blue-500' }
        ];

        function init() {
            renderTabs();
            renderSelectedCategory();
            renderItems();
            renderCategoryOptions();
            window.addEventListener('click', (e) => {
                if (!e.target.closest('#category-selector-container')) {
                    document.getElementById('category-options').classList.add('hidden');
                }
            });
        }

        function toggleForm() {
            const form = document.getElementById('add-form');
            const icon = document.getElementById('form-toggle-icon');
            form.classList.toggle('hidden');
            icon.style.transform = form.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(45deg)';
        }

        function renderCategoryOptions() {
            const container = document.getElementById('category-options');
            container.innerHTML = categories.map(cat => `
                <button onclick="selectCategory('${cat.id}')" class="w-full flex items-center gap-3 px-4 py-4 hover:bg-slate-50 text-left border-b border-slate-50">
                    <div class="w-8 h-8 ${cat.bg} rounded-lg flex items-center justify-center"><i data-lucide="${cat.icon}" class="w-4 h-4 ${cat.color}"></i></div>
                    <span class="text-xs font-bold text-slate-700 uppercase">${cat.label}</span>
                </button>
            `).join('');
            lucide.createIcons();
        }

        function selectCategory(id) {
            selectedCategory = id;
            renderSelectedCategory();
            document.getElementById('category-options').classList.add('hidden');
        }

        function renderSelectedCategory() {
            const display = document.getElementById('selected-category-display');
            const cat = categories.find(c => c.id === selectedCategory);
            display.innerHTML = `<i data-lucide="${cat.icon}" class="w-4 h-4 ${cat.color}"></i><span class="text-slate-700">${cat.label}</span>`;
            lucide.createIcons();
        }

        function toggleCategoryMenu(e) { e.stopPropagation(); document.getElementById('category-options').classList.toggle('hidden'); }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            const tabs = [{ id: 'all', label: 'ALL', icon: 'layout-grid', bg: 'bg-white', color: 'text-slate-400', activeBg: 'bg-slate-900' }, ...categories];
            container.innerHTML = tabs.map(tab => {
                const isActive = activeTab === tab.id;
                return `
                    <button onclick="setActiveTab('${tab.id}')" class="flex items-center gap-2 px-4 py-2.5 rounded-xl font-black border-2 shrink-0 transition-all ${isActive ? tab.activeBg + ' text-white border-transparent' : tab.bg + ' ' + tab.color + ' border-slate-100'}">
                        <span class="text-[9px] uppercase tracking-wider">${tab.label}</span>
                    </button>
                `;
            }).join('');
        }

        function setActiveTab(id) { activeTab = id; renderTabs(); renderItems(); }

        function addItem() {
            const nameInput = document.getElementById('new-name');
            if (!nameInput.value.trim()) return;
            items.unshift({
                id: Date.now(),
                name: nameInput.value,
                category: selectedCategory,
                spot: document.getElementById('new-spot').value || 'London',
                budget: parseInt(document.getElementById('new-budget').value) || 0,
                completed: false,
                shops: []
            });
            save(); renderItems();
            nameInput.value = ''; document.getElementById('new-budget').value = '';
            toggleForm();
        }

        function renderItems() {
            const container = document.getElementById('items-list');
            const filtered = activeTab === 'all' ? items : items.filter(i => i.category === activeTab);
            filtered.sort((a, b) => a.completed - b.completed || b.id - a.id);

            container.innerHTML = filtered.map(item => `
                <div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden card-accent-${item.category}">
                    <div class="p-4 flex items-center gap-3">
                        <button onclick="toggleComplete(${item.id})" class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0 ${item.completed ? 'bg-emerald-500 text-white' : 'bg-slate-50 border border-slate-200 text-transparent'}">
                            <i data-lucide="check" class="w-5 h-5"></i>
                        </button>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-bold text-slate-800 ${item.completed ? 'line-through text-slate-300' : ''}">${item.name}</h3>
                            <div class="flex items-center gap-2 text-[10px] font-black text-slate-400 uppercase">
                                <span>${item.spot}</span>
                                <span class="text-blue-500">£${item.budget.toLocaleString()}</span>
                            </div>
                        </div>
                        <button onclick="deleteItem(${item.id})" class="p-2 text-slate-200 hover:text-rose-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
            updateProgress();
        }

        function toggleComplete(id) { items = items.map(i => i.id === id ? {...i, completed: !i.completed} : i); save(); renderItems(); }
        function deleteItem(id) { if(confirm('削除しますか？')) { items = items.filter(i => i.id !== id); save(); renderItems(); } }
        function updateProgress() {
            let total = items.length, done = items.filter(i => i.completed).length, budget = items.reduce((a, b) => a + b.budget, 0);
            const p = total === 0 ? 0 : Math.round((done/total)*100);
            document.getElementById('progress-percent').innerText = p + '%';
            document.getElementById('progress-bar').style.width = p + '%';
            document.getElementById('total-budget-display').innerText = '£' + budget.toLocaleString();
        }
        function save() { localStorage.setItem('uk_wishlist_v3', JSON.stringify(items)); }
        window.onload = init;
    </script>
</body>
</html>
