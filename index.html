<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>UK TRIP WISHLIST - Mobile Web</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        :root {
            --sab: env(safe-area-inset-bottom);
        }

        body { 
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        /* 下部プログレスバー用の余白 */
        .pb-safe {
            padding-bottom: calc(5rem + var(--sab));
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .modal-base {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            align-items: flex-end;
        }
        .modal-base.show { display: flex; }
        .modal-content {
            width: 100%;
            max-height: 90vh;
            background: white;
            border-radius: 2rem 2rem 0 0;
            padding: 1.5rem 1.5rem calc(1.5rem + var(--sab));
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto;
        }
        .modal-base.show .modal-content { transform: translateY(0); }

        .expandable-content { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .expandable-content.expanded { max-height: 2000px; }

        .card-accent-food { border-left: 4px solid #f97316; }
        .card-accent-shop { border-left: 4px solid #a855f7; }
        .card-accent-spot { border-left: 4px solid #10b981; }
        .card-accent-museum { border-left: 4px solid #3b82f6; }

        input, button, select { font-size: 16px !important; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }
        .float-icon { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="text-slate-900 pb-safe">

    <div class="max-w-md mx-auto px-5">
        <!-- Header -->
        <header class="pt-10 pb-6 flex items-center justify-between sticky top-0 bg-[#f8fafc]/80 backdrop-blur-md z-40">
            <div>
                <h1 class="text-3xl font-black tracking-tighter italic text-slate-800 uppercase leading-none">UK TRIP</h1>
                <p class="text-[10px] text-blue-600 font-bold uppercase tracking-[0.3em] mt-1">Wishlist Web</p>
            </div>
            <button onclick="toggleForm()" id="form-toggle-btn" class="w-12 h-12 bg-slate-900 text-white rounded-2xl flex items-center justify-center shadow-xl transition-all active:scale-95 active:rotate-45">
                <i data-lucide="plus" id="form-toggle-icon" class="w-6 h-6"></i>
            </button>
        </header>

        <!-- Compact Form -->
        <div id="add-form" class="hidden mb-8 bg-white p-6 rounded-[2rem] shadow-2xl shadow-slate-200/50 border border-slate-100 ring-4 ring-slate-50">
            <div class="space-y-4">
                <div class="grid grid-cols-1 gap-3">
                    <div class="relative" id="category-selector-container">
                        <button onclick="toggleCategoryMenu(event)" class="w-full flex items-center justify-between px-4 py-4 bg-slate-50 rounded-2xl border border-slate-100 text-sm">
                            <div id="selected-category-display" class="flex items-center gap-2 font-bold"></div>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i>
                        </button>
                        <div id="category-options" class="hidden absolute top-full left-0 w-full mt-2 bg-white border border-slate-100 rounded-2xl shadow-2xl z-50 overflow-hidden ring-1 ring-slate-100"></div>
                    </div>
                    <input type="text" id="new-name" placeholder="やりたいこと" class="w-full px-5 py-4 bg-slate-50 rounded-2xl border border-slate-100 font-bold placeholder:text-slate-300">
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="new-spot" placeholder="場所" class="w-full px-5 py-4 bg-slate-50 rounded-2xl border border-slate-100 text-sm font-medium placeholder:text-slate-300">
                    <input type="number" id="new-budget" placeholder="予算 (£)" class="w-full px-5 py-4 bg-blue-50/50 rounded-2xl border border-blue-100 text-sm font-black text-blue-600">
                </div>

                <div class="flex flex-wrap items-center justify-between gap-y-3 pt-2">
                    <div class="flex flex-wrap gap-3">
                        <label class="flex items-center gap-1.5 cursor-pointer">
                            <input type="checkbox" id="new-is-free" class="hidden peer">
                            <div class="w-5 h-5 rounded border-2 flex items-center justify-center peer-checked:bg-emerald-500 peer-checked:border-emerald-500 transition-colors"><i data-lucide="check" class="text-white w-3 h-3"></i></div>
                            <span class="text-[9px] font-black text-slate-400 peer-checked:text-emerald-600 uppercase">Free</span>
                        </label>
                        <label class="flex items-center gap-1.5 cursor-pointer">
                            <input type="checkbox" id="new-is-starred" class="hidden peer">
                            <div class="w-5 h-5 rounded border-2 flex items-center justify-center peer-checked:bg-yellow-400 peer-checked:border-yellow-400 transition-colors"><i data-lucide="crown" class="text-white w-3 h-3 fill-current"></i></div>
                            <span class="text-[9px] font-black text-slate-400 peer-checked:text-yellow-600 uppercase">Priority</span>
                        </label>
                        <label class="flex items-center gap-1.5 cursor-pointer">
                            <input type="checkbox" id="new-is-reserved" class="hidden peer">
                            <div class="w-5 h-5 rounded border-2 flex items-center justify-center peer-checked:bg-blue-500 peer-checked:border-blue-500 transition-colors"><i data-lucide="calendar-check" class="text-white w-3 h-3"></i></div>
                            <span class="text-[9px] font-black text-slate-400 peer-checked:text-blue-600 uppercase">Reserve</span>
                        </label>
                    </div>
                    <button onclick="addItem()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg active:scale-95 transition-transform">追加</button>
                </div>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="flex justify-start gap-2 mb-8 overflow-x-auto pb-4 scrollbar-hide -mx-1 px-1">
            <div id="tabs-container" class="flex gap-2"></div>
        </div>

        <!-- List Content -->
        <div id="items-list" class="space-y-4"></div>
    </div>

    <!-- REFINED BOTTOM PROGRESS BAR -->
    <div class="fixed bottom-0 left-0 right-0 p-4 pb-[calc(1rem + var(--sab))] pointer-events-none z-[80]">
        <div class="max-w-md mx-auto bg-white/70 backdrop-blur-xl rounded-[1.25rem] p-3 px-5 shadow-xl shadow-slate-200/50 flex items-center justify-between pointer-events-auto border border-white/40 ring-1 ring-slate-100/50">
            <div class="flex items-center gap-4">
                <div class="flex flex-col">
                    <span class="text-[6px] font-black text-slate-400 uppercase tracking-[0.2em]">Goal</span>
                    <span id="progress-percent" class="text-base font-black italic text-slate-800 leading-none">0%</span>
                </div>
                <div class="w-20 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-blue-500 h-full transition-all duration-700 ease-out" style="width: 0%"></div>
                </div>
            </div>
            <div class="text-right">
                <span class="text-[6px] font-black text-slate-400 uppercase tracking-[0.2em] block">Budget</span>
                <span id="total-budget-display" class="text-sm font-black text-slate-800 tabular-nums leading-none">£0</span>
            </div>
        </div>
    </div>

    <!-- MODAL: EDIT -->
    <div id="edit-modal" class="modal-base" onclick="closeEditModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="w-16 h-1.5 bg-slate-100 rounded-full mx-auto mb-8"></div>
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-2xl font-black text-slate-800 flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center"><i data-lucide="edit-3" class="w-5 h-5"></i></div>
                    編集
                </h3>
                <button onclick="closeEditModal()" class="text-slate-300"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div class="space-y-6 mb-10">
                <input type="text" id="modal-edit-name" class="w-full px-5 py-4 bg-slate-50 rounded-2xl border border-slate-100 font-bold outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="modal-edit-spot" class="w-full px-5 py-4 bg-slate-50 rounded-2xl border border-slate-100 font-bold outline-none">
                    <input type="number" id="modal-edit-budget" class="w-full px-5 py-4 bg-blue-50/50 rounded-2xl border border-blue-100 font-black text-blue-600 outline-none">
                </div>
            </div>
            <button onclick="saveModalEdit()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest active:scale-95 transition-transform">保存</button>
        </div>
    </div>

    <!-- MODAL: DELETE -->
    <div id="delete-modal" class="modal-base flex items-center justify-center p-8 bg-slate-900/80" style="display: none;" onclick="closeDeleteModal()">
        <div class="bg-white rounded-[3rem] p-10 max-w-xs w-full shadow-2xl text-center" onclick="event.stopPropagation()">
            <div class="w-20 h-20 bg-rose-50 text-rose-500 rounded-3xl flex items-center justify-center mx-auto mb-6 float-icon">
                <i data-lucide="trash-2" class="w-10 h-10"></i>
            </div>
            <h3 class="text-xl font-black text-slate-800 mb-2">削除しますか？</h3>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-8 leading-relaxed">この操作は取り消せません</p>
            <div class="flex flex-col gap-3">
                <button onclick="executeDelete()" class="w-full py-5 bg-rose-500 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg active:scale-95 transition-transform">削除する</button>
                <button onclick="closeDeleteModal()" class="w-full py-4 bg-slate-50 text-slate-400 rounded-2xl font-black text-xs uppercase tracking-widest">キャンセル</button>
            </div>
        </div>
    </div>

    <script>
        let items = JSON.parse(localStorage.getItem('uk_wishlist_web_v2')) || [];
        let activeTab = 'all';
        let selectedCategory = 'food';
        let expandedId = null;
        let editingItem = null;
        let itemToDelete = null;

        const categories = [
            { id: 'food', label: 'グルメ', icon: 'utensils', color: 'text-orange-500', bg: 'bg-orange-50', activeBg: 'bg-orange-500' },
            { id: 'shop', label: '買い物', icon: 'shopping-bag', color: 'text-purple-500', bg: 'bg-purple-50', activeBg: 'bg-purple-500' },
            { id: 'spot', label: '観光', icon: 'camera', color: 'text-emerald-500', bg: 'bg-emerald-50', activeBg: 'bg-emerald-500' },
            { id: 'museum', label: '文化', icon: 'landmark', color: 'text-blue-500', bg: 'bg-blue-50', activeBg: 'bg-blue-500' }
        ];

        function init() {
            renderTabs();
            renderSelectedCategory();
            renderItems();
            renderCategoryOptions();
            window.addEventListener('click', (e) => {
                if (!e.target.closest('#category-selector-container')) {
                    document.getElementById('category-options').classList.add('hidden');
                }
            });
        }

        function toggleForm() {
            const form = document.getElementById('add-form');
            const icon = document.getElementById('form-toggle-icon');
            const btn = document.getElementById('form-toggle-btn');
            form.classList.toggle('hidden');
            const isOpen = !form.classList.contains('hidden');
            btn.classList.toggle('bg-rose-500', isOpen);
            btn.classList.toggle('bg-slate-900', !isOpen);
            icon.style.transform = isOpen ? 'rotate(45deg)' : 'rotate(0deg)';
        }

        function renderCategoryOptions() {
            const container = document.getElementById('category-options');
            container.innerHTML = categories.map(cat => `
                <button onclick="selectCategory('${cat.id}')" class="w-full flex items-center gap-4 px-6 py-5 hover:bg-slate-50 text-left border-b border-slate-50 last:border-0 active:bg-slate-100">
                    <div class="w-10 h-10 ${cat.bg} rounded-xl flex items-center justify-center"><i data-lucide="${cat.icon}" class="w-5 h-5 ${cat.color}"></i></div>
                    <span class="text-sm font-black text-slate-700 uppercase">${cat.label}</span>
                </button>
            `).join('');
            lucide.createIcons();
        }

        function selectCategory(id) {
            selectedCategory = id;
            renderSelectedCategory();
            document.getElementById('category-options').classList.add('hidden');
        }

        function renderSelectedCategory() {
            const display = document.getElementById('selected-category-display');
            const cat = categories.find(c => c.id === selectedCategory);
            display.innerHTML = `<i data-lucide="${cat.icon}" class="w-4 h-4 ${cat.color}"></i><span class="text-slate-700 uppercase tracking-tight">${cat.label}</span>`;
            lucide.createIcons();
        }

        function toggleCategoryMenu(e) {
            e.stopPropagation();
            document.getElementById('category-options').classList.toggle('hidden');
        }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            const tabs = [{ id: 'all', label: 'すべて', icon: 'layout-grid', bg: 'bg-white', color: 'text-slate-400', activeBg: 'bg-slate-900' }, ...categories];
            container.innerHTML = tabs.map(tab => {
                const isActive = activeTab === tab.id;
                return `
                    <button onclick="setActiveTab('${tab.id}')" class="flex items-center gap-2 px-5 py-3 rounded-2xl font-black border-2 shrink-0 transition-all ${isActive ? tab.activeBg + ' text-white border-transparent' : tab.bg + ' ' + tab.color + ' border-slate-100'}">
                        <i data-lucide="${tab.icon}" class="w-4 h-4"></i>
                        <span class="text-[10px] uppercase tracking-widest">${tab.label}</span>
                    </button>
                `;
            }).join('');
            lucide.createIcons();
        }

        function setActiveTab(id) {
            activeTab = id;
            renderTabs();
            renderItems();
        }

        function addItem() {
            const nameInput = document.getElementById('new-name');
            if (!nameInput.value.trim()) return;
            items.unshift({
                id: Date.now(),
                name: nameInput.value,
                category: selectedCategory,
                spot: document.getElementById('new-spot').value || 'London',
                budget: parseInt(document.getElementById('new-budget').value) || 0,
                isFree: document.getElementById('new-is-free').checked,
                isStarred: document.getElementById('new-is-starred').checked,
                isReserved: document.getElementById('new-is-reserved').checked,
                completed: false,
                shops: []
            });
            save(); renderItems();
            nameInput.value = ''; document.getElementById('new-spot').value = ''; document.getElementById('new-budget').value = '';
            document.getElementById('new-is-free').checked = false;
            document.getElementById('new-is-starred').checked = false;
            document.getElementById('new-is-reserved').checked = false;
            toggleForm();
        }

        function renderItems() {
            const container = document.getElementById('items-list');
            const filtered = activeTab === 'all' ? items : items.filter(i => i.category === activeTab);
            filtered.sort((a, b) => (a.completed - b.completed) || (b.isStarred - a.isStarred) || (b.id - a.id));

            if (filtered.length === 0) {
                container.innerHTML = `<p class="py-20 text-center text-slate-300 font-bold text-sm">項目がありません</p>`;
                updateProgress(); return;
            }

            container.innerHTML = filtered.map(item => {
                const isExpanded = expandedId === item.id;
                
                return `
                <div class="bg-white rounded-[1.5rem] border border-slate-100 shadow-sm overflow-hidden card-accent-${item.category}">
                    <div class="p-4 flex items-center gap-4" onclick="toggleExpand(${item.id})">
                        <button onclick="event.stopPropagation(); toggleComplete(${item.id})" class="w-8 h-8 rounded-xl flex items-center justify-center transition-all ${item.completed ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-100' : 'bg-slate-50 border-2 border-slate-100 text-slate-100'}">
                            <i data-lucide="check" class="w-5 h-5"></i>
                        </button>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-0.5 truncate font-black text-slate-800 ${item.completed ? 'line-through text-slate-300' : ''}">
                                ${item.name}
                                ${item.isStarred ? '<i data-lucide="crown" class="w-3 h-3 text-yellow-400 fill-current inline ml-1"></i>' : ''}
                                ${item.isReserved ? '<i data-lucide="calendar-check" class="w-3 h-3 text-blue-500 inline ml-1"></i>' : ''}
                            </div>
                            <div class="flex items-center gap-3 text-[10px] font-bold text-slate-400 uppercase tracking-tight">
                                <span class="flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i>${item.spot}</span>
                                <span class="${item.isFree ? 'text-emerald-500' : 'text-blue-500'} italic">£${item.budget.toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-1">
                            <button onclick="event.stopPropagation(); openEditModal(${item.id})" class="w-8 h-8 flex items-center justify-center text-slate-200 hover:text-blue-500"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                            <button onclick="event.stopPropagation(); askDelete(${item.id})" class="w-8 h-8 flex items-center justify-center text-slate-200 hover:text-rose-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>

                    <!-- 店舗リスト (グルメのみ) -->
                    ${item.category === 'food' ? `
                    <div class="expandable-content ${isExpanded ? 'expanded' : ''} bg-slate-50/50 border-t border-slate-100">
                        <div class="px-4 pb-5 pt-3 space-y-3">
                            <div class="flex gap-2">
                                <input id="shop-input-${item.id}" type="text" placeholder="お店の名前..." class="flex-1 text-[11px] px-4 py-3 bg-white rounded-xl border border-slate-100 outline-none font-bold shadow-inner" onclick="event.stopPropagation()">
                                <button onclick="event.stopPropagation(); addShop(${item.id})" class="bg-slate-900 text-white px-4 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest active:scale-95 transition-transform">追加</button>
                            </div>
                            <div class="space-y-2">
                                ${(item.shops || []).map((shop, idx) => `
                                    <div class="flex items-center justify-between bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                                        <div class="flex items-center gap-3 flex-1 min-w-0" onclick="event.stopPropagation(); toggleShopComplete(${item.id}, ${idx})">
                                            <div class="w-5 h-5 rounded-full border-2 flex items-center justify-center ${shop.completed ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-100 text-slate-100'}">
                                                <i data-lucide="check" class="w-3 h-3"></i>
                                            </div>
                                            <div class="flex-1 min-w-0">
                                                <div class="text-[11px] font-bold text-slate-700 truncate ${shop.completed ? 'line-through text-slate-300' : ''}">
                                                    ${shop.name}
                                                    ${shop.isPriority ? '<i data-lucide="crown" class="w-2.5 h-2.5 text-yellow-400 fill-current inline ml-1"></i>' : ''}
                                                </div>
                                            </div>
                                        </div>
                                        <div class="flex items-center gap-1">
                                            <button onclick="event.stopPropagation(); toggleShopPriority(${item.id}, ${idx})" class="p-2 ${shop.isPriority ? 'text-yellow-400' : 'text-slate-100 hover:text-yellow-400'}"><i data-lucide="crown" class="w-3.5 h-3.5 ${shop.isPriority ? 'fill-current' : ''}"></i></button>
                                            <button onclick="event.stopPropagation(); window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(shop.name + ' ' + item.spot)}', '_blank')" class="p-2 text-slate-100 hover:text-blue-500"><i data-lucide="map" class="w-3.5 h-3.5"></i></button>
                                            <button onclick="event.stopPropagation(); removeShop(${item.id}, ${idx})" class="p-2 text-slate-100 hover:text-rose-500"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>` : ''}
                </div>
            `; }).join('');
            
            lucide.createIcons(); updateProgress();
        }

        // 店舗管理
        function addShop(itemId) {
            const input = document.getElementById(`shop-input-${itemId}`);
            const val = input.value.trim();
            if(!val) return;
            items = items.map(i => i.id === itemId ? {...i, shops: [...(i.shops || []), {name: val, completed: false, isPriority: false}]} : i);
            save(); renderItems();
        }

        function toggleShopComplete(itemId, shopIdx) {
            items = items.map(i => {
                if(i.id === itemId) {
                    const shops = [...i.shops];
                    shops[shopIdx].completed = !shops[shopIdx].completed;
                    return {...i, shops};
                }
                return i;
            });
            save(); renderItems();
        }

        function toggleShopPriority(itemId, shopIdx) {
            items = items.map(i => {
                if(i.id === itemId) {
                    const shops = [...i.shops];
                    shops[shopIdx].isPriority = !shops[shopIdx].isPriority;
                    return {...i, shops};
                }
                return i;
            });
            save(); renderItems();
        }

        function removeShop(itemId, shopIdx) {
            items = items.map(i => {
                if(i.id === itemId) {
                    const shops = [...i.shops];
                    shops.splice(shopIdx, 1);
                    return {...i, shops};
                }
                return i;
            });
            save(); renderItems();
        }

        function toggleExpand(id) {
            const item = items.find(i => i.id === id);
            if(item && item.category === 'food') {
                expandedId = expandedId === id ? null : id;
                renderItems();
            }
        }

        function toggleComplete(id) {
            items = items.map(i => i.id === id ? {...i, completed: !i.completed} : i);
            save(); renderItems();
        }

        function openEditModal(id) {
            editingItem = items.find(i => i.id === id);
            document.getElementById('modal-edit-name').value = editingItem.name;
            document.getElementById('modal-edit-spot').value = editingItem.spot;
            document.getElementById('modal-edit-budget').value = editingItem.budget;
            document.getElementById('edit-modal').classList.add('show');
        }

        function closeEditModal() { document.getElementById('edit-modal').classList.remove('show'); }

        function saveModalEdit() {
            items = items.map(i => i.id === editingItem.id ? {...i, name: document.getElementById('modal-edit-name').value, spot: document.getElementById('modal-edit-spot').value, budget: parseInt(document.getElementById('modal-edit-budget').value) || 0} : i);
            save(); renderItems(); closeEditModal();
        }

        function askDelete(id) {
            itemToDelete = id;
            const modal = document.getElementById('delete-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
        }

        function closeDeleteModal() {
            const modal = document.getElementById('delete-modal');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
            itemToDelete = null;
        }

        function executeDelete() {
            if (itemToDelete) {
                items = items.filter(i => i.id !== itemToDelete);
                save(); renderItems(); closeDeleteModal();
            }
        }

        function updateProgress() {
            let total = 0, done = 0, budget = 0;
            items.forEach(i => {
                total++; if(i.completed) done++;
                budget += i.budget;
                (i.shops || []).forEach(s => {
                    total++; if(s.completed) done++;
                });
            });
            const p = total === 0 ? 0 : Math.round((done/total)*100);
            document.getElementById('progress-percent').innerText = p + '%';
            document.getElementById('progress-bar').style.width = p + '%';
            document.getElementById('total-budget-display').innerText = '£' + budget.toLocaleString();
        }

        function save() { localStorage.setItem('uk_wishlist_web_v2', JSON.stringify(items)); }

        window.onload = init;
    </script>
</body>
</html>
