<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Web App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="UK Trip">
    <meta name="theme-color" content="#f8fafc">
    
    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230f172a'/%3E%3Cpath d='M0 45h100v10H0z' fill='%231e293b'/%3E%3Cpath d='M45 0h10v100H45z' fill='%231e293b'/%3E%3Cpath d='M50 25 L50 75 M25 50 L75 50' stroke='%233b82f6' stroke-width='8' stroke-linecap='round'/%3E%3Ccircle cx='50' cy='50' r='12' fill='%233b82f6'/%3E%3C/svg%3E">

    <title>Honeymoon Wishlist</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        :root { --sab: env(safe-area-inset-bottom); }

        body { 
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        .scroll-text-container {
            overflow: hidden;
            white-space: nowrap;
            position: relative;
        }
        
        .scroll-text {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .animate-scroll {
            animation: scroll-left 10s linear infinite;
            padding-right: 50px;
        }

        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .pb-safe { padding-bottom: calc(5rem + var(--sab)); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        .modal-base {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            align-items: flex-end;
        }
        .modal-base.show { display: flex; }
        .modal-content {
            width: 100%;
            max-height: 90vh;
            background: white;
            border-radius: 2rem 2rem 0 0;
            padding: 1.5rem 1.5rem calc(1.5rem + var(--sab));
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto;
        }
        .modal-base.show .modal-content { transform: translateY(0); }

        .expandable-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
        .expandable-content.expanded { max-height: 1000px; }

        .card-accent-food { border-left: 3px solid #f97316; }
        .card-accent-shop { border-left: 3px solid #a855f7; }
        .card-accent-spot { border-left: 3px solid #10b981; }
        .card-accent-museum { border-left: 3px solid #3b82f6; }
    </style>
</head>
<body class="text-slate-900 pb-safe">

    <div class="max-w-md mx-auto px-5">
        <!-- Header -->
        <header class="pt-8 pb-4 flex items-center justify-between sticky top-0 bg-[#f8fafc]/80 backdrop-blur-md z-40">
            <div>
                <h1 class="text-2xl font-black tracking-tighter italic text-slate-800 uppercase leading-none">UK TRIP</h1>
                <p class="text-[8px] text-blue-600 font-bold uppercase tracking-[0.3em] mt-1">Wishlist</p>
            </div>
            <button onclick="toggleForm()" id="form-toggle-btn" class="w-10 h-10 bg-slate-900 text-white rounded-xl flex items-center justify-center shadow-lg transition-all active:scale-95">
                <i data-lucide="plus" id="form-toggle-icon" class="w-5 h-5 transition-transform duration-300"></i>
            </button>
        </header>

        <!-- Main Form -->
        <div id="add-form" class="hidden mb-6 bg-white p-5 rounded-[1.5rem] shadow-xl border border-slate-100">
            <div class="space-y-3">
                <div class="grid grid-cols-1 gap-2">
                    <div class="relative" id="category-selector-container">
                        <button onclick="toggleCategoryMenu(event)" class="w-full flex items-center justify-between px-4 py-3 bg-slate-50 rounded-xl border border-slate-100 text-xs">
                            <div id="selected-category-display" class="flex items-center gap-2 font-bold"></div>
                            <i data-lucide="chevron-down" class="w-3 h-3 text-slate-400"></i>
                        </button>
                        <div id="category-options" class="hidden absolute top-full left-0 w-full mt-1 bg-white border border-slate-100 rounded-xl shadow-2xl z-50 overflow-hidden"></div>
                    </div>
                    <input type="text" id="new-name" placeholder="やりたいこと（例：アフタヌーンティー）" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-100 text-sm font-bold placeholder:text-slate-300 outline-none">
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="new-spot" placeholder="場所（例：London）" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-100 text-xs font-medium outline-none">
                    <input type="number" id="new-budget" placeholder="予算 (£) 0=FREE" class="w-full px-4 py-3 bg-blue-50/50 rounded-xl border border-blue-100 text-xs font-black text-blue-600 outline-none">
                </div>

                <div class="flex items-center justify-between pt-2">
                    <div class="flex gap-2">
                        <label class="cursor-pointer group">
                            <input type="checkbox" id="new-is-starred" class="hidden peer">
                            <div class="w-8 h-8 rounded-lg border-2 flex items-center justify-center peer-checked:bg-yellow-400 peer-checked:border-yellow-400 text-slate-200 peer-checked:text-white transition-all">
                                <i data-lucide="crown" class="w-4 h-4 fill-current"></i>
                            </div>
                        </label>
                        <label class="cursor-pointer group">
                            <input type="checkbox" id="new-is-reserved" class="hidden peer">
                            <div class="w-8 h-8 rounded-lg border-2 flex items-center justify-center peer-checked:bg-blue-500 peer-checked:border-blue-500 text-slate-200 peer-checked:text-white transition-all">
                                <i data-lucide="calendar-check" class="w-4 h-4"></i>
                            </div>
                        </label>
                    </div>
                    <button onclick="addItem()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-black text-[10px] uppercase tracking-widest active:scale-95">追加</button>
                </div>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="flex justify-start gap-2 mb-6 overflow-x-auto pb-2 scrollbar-hide -mx-1 px-1">
            <div id="tabs-container" class="flex gap-2"></div>
        </div>

        <!-- List Content -->
        <div id="items-list" class="space-y-3"></div>
    </div>

    <!-- Bottom Dashboard -->
    <div class="fixed bottom-0 left-0 right-0 p-4 pb-[calc(1rem + var(--sab))] pointer-events-none z-[80]">
        <div class="max-w-md mx-auto bg-white/70 backdrop-blur-xl rounded-2xl p-3 px-5 shadow-xl flex items-center justify-between pointer-events-auto border border-white/40">
            <div class="flex items-center gap-4">
                <div class="flex flex-col">
                    <span class="text-[6px] font-black text-slate-400 uppercase tracking-[0.2em]">Progress</span>
                    <span id="progress-percent" class="text-sm font-black italic text-slate-800 leading-none">0%</span>
                </div>
                <div class="w-16 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-blue-500 h-full transition-all duration-700" style="width: 0%"></div>
                </div>
            </div>
            <div class="text-right">
                <span class="text-[6px] font-black text-slate-400 uppercase tracking-[0.2em] block">Budget</span>
                <span id="total-budget-display" class="text-xs font-black text-slate-800 tabular-nums">£0</span>
            </div>
        </div>
    </div>

    <!-- Edit Main Item Modal -->
    <div id="edit-modal" class="modal-base" onclick="closeEditModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="w-12 h-1 bg-slate-100 rounded-full mx-auto mb-6"></div>
            <h3 class="text-lg font-black text-slate-800 mb-6 flex items-center gap-2">
                <i data-lucide="edit-3" class="w-5 h-5 text-blue-500"></i>内容の編集
            </h3>
            <div class="space-y-4 mb-8">
                <input type="text" id="modal-edit-name" class="w-full px-4 py-4 bg-slate-50 rounded-xl border border-slate-100 font-bold outline-none">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="modal-edit-spot" class="w-full px-4 py-4 bg-slate-50 rounded-xl border border-slate-100 font-bold outline-none">
                    <input type="number" id="modal-edit-budget" class="w-full px-4 py-4 bg-blue-50/50 rounded-xl border border-blue-100 font-black text-blue-600 outline-none">
                </div>
                
                <div class="flex gap-4 p-4 bg-slate-50 rounded-xl border border-slate-100">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="modal-edit-starred" class="hidden peer">
                        <div class="w-10 h-10 rounded-xl border-2 flex items-center justify-center peer-checked:bg-yellow-400 peer-checked:border-yellow-400 text-slate-200 peer-checked:text-white transition-all">
                            <i data-lucide="crown" class="w-5 h-5 fill-current"></i>
                        </div>
                        <span class="text-[10px] font-black text-slate-400 peer-checked:text-yellow-500 uppercase">Priority</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="modal-edit-reserved" class="hidden peer">
                        <div class="w-10 h-10 rounded-xl border-2 flex items-center justify-center peer-checked:bg-blue-500 peer-checked:border-blue-500 text-slate-200 peer-checked:text-white transition-all">
                            <i data-lucide="calendar-check" class="w-5 h-5"></i>
                        </div>
                        <span class="text-[10px] font-black text-slate-400 peer-checked:text-blue-500 uppercase">Reserved</span>
                    </label>
                </div>
            </div>
            <button onclick="saveModalEdit()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black uppercase tracking-widest active:scale-95">更新する</button>
        </div>
    </div>

    <!-- Edit Shop Modal -->
    <div id="shop-edit-modal" class="modal-base" onclick="closeShopEditModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="w-12 h-1 bg-slate-100 rounded-full mx-auto mb-6"></div>
            <h3 class="text-lg font-black text-slate-800 mb-6 flex items-center gap-2">
                <i data-lucide="store" class="w-5 h-5 text-purple-500"></i>お店情報の編集
            </h3>
            <div class="space-y-4 mb-8">
                <input type="text" id="modal-shop-name" placeholder="店名" class="w-full px-4 py-4 bg-slate-50 rounded-xl border border-slate-100 font-bold outline-none">
                <input type="text" id="modal-shop-url" placeholder="Google Maps URL" class="w-full px-4 py-4 bg-slate-50 rounded-xl border border-slate-100 text-sm outline-none">
                
                <div class="flex gap-4 p-4 bg-slate-50 rounded-xl border border-slate-100">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="modal-shop-starred" class="hidden peer">
                        <div class="w-10 h-10 rounded-xl border-2 flex items-center justify-center peer-checked:bg-yellow-400 peer-checked:border-yellow-400 text-slate-200 peer-checked:text-white transition-all">
                            <i data-lucide="crown" class="w-5 h-5 fill-current"></i>
                        </div>
                        <span class="text-[10px] font-black text-slate-400 peer-checked:text-yellow-500 uppercase">Priority</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="modal-shop-reserved" class="hidden peer">
                        <div class="w-10 h-10 rounded-xl border-2 flex items-center justify-center peer-checked:bg-blue-500 peer-checked:border-blue-500 text-slate-200 peer-checked:text-white transition-all">
                            <i data-lucide="calendar-check" class="w-5 h-5"></i>
                        </div>
                        <span class="text-[10px] font-black text-slate-400 peer-checked:text-blue-500 uppercase">Reserved</span>
                    </label>
                </div>
            </div>
            <button onclick="saveShopEdit()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black uppercase tracking-widest active:scale-95">ショップ情報を更新</button>
        </div>
    </div>

    <script>
        let items = JSON.parse(localStorage.getItem('uk_wishlist_v4')) || [];
        let activeTab = 'all';
        let selectedCategory = 'food';
        let expandedId = null;
        let editingItemId = null;
        let editingShopInfo = null; // { itemId, shopIndex }

        const categories = [
            { id: 'food', label: 'グルメ', icon: 'utensils', color: 'text-orange-500', bg: 'bg-orange-50', activeBg: 'bg-orange-500' },
            { id: 'shop', label: '買い物', icon: 'shopping-bag', color: 'text-purple-500', bg: 'bg-purple-50', activeBg: 'bg-purple-500' },
            { id: 'spot', label: '観光', icon: 'camera', color: 'text-emerald-500', bg: 'bg-emerald-50', activeBg: 'bg-emerald-500' },
            { id: 'museum', label: '文化', icon: 'landmark', color: 'text-blue-500', bg: 'bg-blue-50', activeBg: 'bg-blue-500' }
        ];

        function init() {
            renderTabs();
            renderSelectedCategory();
            renderItems();
            renderCategoryOptions();
            window.addEventListener('click', (e) => {
                if (!e.target.closest('#category-selector-container')) {
                    document.getElementById('category-options').classList.add('hidden');
                }
            });
        }

        function toggleForm() {
            const form = document.getElementById('add-form');
            const icon = document.getElementById('form-toggle-icon');
            form.classList.toggle('hidden');
            icon.style.transform = form.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(45deg)';
        }

        function renderCategoryOptions() {
            const container = document.getElementById('category-options');
            container.innerHTML = categories.map(cat => `
                <button onclick="selectCategory('${cat.id}')" class="w-full flex items-center gap-3 px-4 py-4 hover:bg-slate-50 text-left border-b border-slate-50 last:border-0">
                    <div class="w-8 h-8 ${cat.bg} rounded-lg flex items-center justify-center"><i data-lucide="${cat.icon}" class="w-4 h-4 ${cat.color}"></i></div>
                    <span class="text-xs font-bold text-slate-700 uppercase">${cat.label}</span>
                </button>
            `).join('');
            lucide.createIcons();
        }

        function selectCategory(id) {
            selectedCategory = id;
            renderSelectedCategory();
            document.getElementById('category-options').classList.add('hidden');
        }

        function renderSelectedCategory() {
            const display = document.getElementById('selected-category-display');
            const cat = categories.find(c => c.id === selectedCategory);
            display.innerHTML = `<i data-lucide="${cat.icon}" class="w-4 h-4 ${cat.color}"></i><span class="text-slate-700">${cat.label}</span>`;
            lucide.createIcons();
        }

        function toggleCategoryMenu(e) {
            e.stopPropagation();
            document.getElementById('category-options').classList.toggle('hidden');
        }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            const tabs = [{ id: 'all', label: 'ALL', icon: 'layout-grid', bg: 'bg-white', color: 'text-slate-400', activeBg: 'bg-slate-900' }, ...categories];
            container.innerHTML = tabs.map(tab => {
                const isActive = activeTab === tab.id;
                return `
                    <button onclick="setActiveTab('${tab.id}')" class="flex items-center gap-2 px-4 py-2.5 rounded-xl font-black border-2 shrink-0 transition-all ${isActive ? tab.activeBg + ' text-white border-transparent' : tab.bg + ' ' + tab.color + ' border-slate-100'}">
                        <span class="text-[9px] uppercase tracking-wider">${tab.label}</span>
                    </button>
                `;
            }).join('');
        }

        function setActiveTab(id) {
            activeTab = id;
            renderTabs();
            renderItems();
        }

        function addItem() {
            const nameInput = document.getElementById('new-name');
            if (!nameInput.value.trim()) return;
            items.unshift({
                id: Date.now(),
                name: nameInput.value,
                category: selectedCategory,
                spot: document.getElementById('new-spot').value || 'London',
                budget: parseInt(document.getElementById('new-budget').value) || 0,
                isStarred: document.getElementById('new-is-starred').checked,
                isReserved: document.getElementById('new-is-reserved').checked,
                completed: false,
                shops: []
            });
            save(); renderItems();
            nameInput.value = '';
            document.getElementById('new-budget').value = '';
            document.getElementById('new-is-starred').checked = false;
            document.getElementById('new-is-reserved').checked = false;
            toggleForm();
        }

        function renderItems() {
            const container = document.getElementById('items-list');
            const filtered = activeTab === 'all' ? items : items.filter(i => i.category === activeTab);
            filtered.sort((a, b) => (a.completed - b.completed) || (b.isStarred - a.isStarred) || (b.id - a.id));

            if (filtered.length === 0) {
                container.innerHTML = `<div class="py-10 text-center text-slate-300 text-xs font-bold">リストが空です</div>`;
                updateProgress(); return;
            }

            container.innerHTML = filtered.map(item => {
                const isExpanded = expandedId === item.id;
                const isFree = item.budget === 0;
                return `
                <div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden card-accent-${item.category}">
                    <div class="p-3 flex items-center gap-3" onclick="toggleExpand(${item.id})">
                        <button onclick="event.stopPropagation(); toggleComplete(${item.id})" class="w-7 h-7 rounded-lg flex items-center justify-center shrink-0 transition-all ${item.completed ? 'bg-emerald-500 text-white border-emerald-500' : 'bg-slate-50 border border-slate-200 text-transparent'}">
                            <i data-lucide="check" class="w-4 h-4"></i>
                        </button>
                        
                        <div class="flex-1 min-w-0 scroll-text-container">
                            <div id="text-${item.id}" class="scroll-text flex items-center gap-1.5 font-bold text-slate-800 text-sm ${item.completed ? 'line-through text-slate-300' : ''}">
                                ${item.name}
                                ${item.isStarred ? '<i data-lucide="crown" class="w-3 h-3 text-yellow-400 fill-current shrink-0"></i>' : ''}
                                ${item.isReserved ? '<i data-lucide="calendar-check" class="w-3 h-3 text-blue-500 shrink-0"></i>' : ''}
                            </div>
                            <div class="flex items-center gap-2 text-[9px] font-bold text-slate-400 uppercase">
                                <span>${item.spot}</span>
                                ${isFree 
                                    ? '<span class="flex items-center gap-0.5 text-emerald-500"><i data-lucide="sparkles" class="w-2 h-2"></i>FREE</span>' 
                                    : `<span class="text-blue-500 italic">£${item.budget.toLocaleString()}</span>`
                                }
                            </div>
                        </div>

                        <div class="flex items-center gap-0.5 shrink-0">
                            <button onclick="event.stopPropagation(); openEditModal(${item.id})" class="p-2 text-slate-200 hover:text-blue-500"><i data-lucide="edit-2" class="w-3.5 h-3.5"></i></button>
                            <button onclick="event.stopPropagation(); deleteItem(${item.id})" class="p-2 text-slate-200 hover:text-rose-500"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                        </div>
                    </div>

                    ${item.category === 'food' ? `
                    <div class="expandable-content ${isExpanded ? 'expanded' : ''} bg-slate-50/50">
                        <div class="px-3 pb-3 pt-1 space-y-2">
                            <!-- Shop Add Form -->
                            <div class="flex flex-col gap-2 p-2 bg-white rounded-xl border border-slate-200 shadow-sm" onclick="event.stopPropagation()">
                                <input id="shop-name-${item.id}" type="text" placeholder="お店の名前" class="text-[10px] px-3 py-2 bg-slate-50 rounded-lg outline-none">
                                <div class="flex items-center gap-2">
                                    <input id="shop-url-${item.id}" type="text" placeholder="Map URL (任意)" class="flex-1 text-[10px] px-3 py-2 bg-slate-50 rounded-lg outline-none">
                                    <div class="flex gap-1 shrink-0">
                                        <label class="cursor-pointer">
                                            <input type="checkbox" id="shop-star-${item.id}" class="hidden peer">
                                            <div class="w-7 h-7 rounded-lg border flex items-center justify-center peer-checked:bg-yellow-400 peer-checked:border-yellow-400 text-slate-200 peer-checked:text-white transition-colors"><i data-lucide="crown" class="w-3.5 h-3.5"></i></div>
                                        </label>
                                        <label class="cursor-pointer">
                                            <input type="checkbox" id="shop-res-${item.id}" class="hidden peer">
                                            <div class="w-7 h-7 rounded-lg border flex items-center justify-center peer-checked:bg-blue-500 peer-checked:border-blue-500 text-slate-200 peer-checked:text-white transition-colors"><i data-lucide="calendar-check" class="w-3.5 h-3.5"></i></div>
                                        </label>
                                    </div>
                                    <button onclick="addShop(${item.id})" class="bg-slate-800 text-white px-3 py-2 rounded-lg text-[9px] font-black uppercase active:scale-95">追加</button>
                                </div>
                            </div>

                            <div class="space-y-1">
                                ${(item.shops || []).map((shop, idx) => `
                                    <div class="flex items-center justify-between bg-white px-3 py-2.5 rounded-lg border border-slate-100 shadow-sm">
                                        <div class="flex items-center gap-2 flex-1 min-w-0" onclick="event.stopPropagation(); toggleShopComplete(${item.id}, ${idx})">
                                            <div class="w-5 h-5 rounded-md border flex items-center justify-center shrink-0 ${shop.completed ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-200 text-transparent'}">
                                                <i data-lucide="check" class="w-3 h-3"></i>
                                            </div>
                                            <span class="text-[11px] font-bold text-slate-700 truncate ${shop.completed ? 'line-through text-slate-300' : ''}">${shop.name}</span>
                                        </div>
                                        <div class="flex items-center gap-0.5 shrink-0">
                                            <button onclick="event.stopPropagation(); toggleShopStatus(${item.id}, ${idx}, 'isStarred')" class="p-1.5 ${shop.isStarred ? 'text-yellow-400' : 'text-slate-200'} hover:bg-slate-50 rounded-lg transition-colors">
                                                <i data-lucide="crown" class="w-3.5 h-3.5 ${shop.isStarred ? 'fill-current' : ''}"></i>
                                            </button>
                                            <button onclick="event.stopPropagation(); toggleShopStatus(${item.id}, ${idx}, 'isReserved')" class="p-1.5 ${shop.isReserved ? 'text-blue-500' : 'text-slate-200'} hover:bg-slate-50 rounded-lg transition-colors">
                                                <i data-lucide="calendar-check" class="w-3.5 h-3.5"></i>
                                            </button>
                                            <button onclick="event.stopPropagation(); openMap('${shop.url}', '${shop.name}', '${item.spot}')" class="p-1.5 text-blue-400 hover:bg-blue-50 rounded-lg">
                                                <i data-lucide="map-pin" class="w-3.5 h-3.5"></i>
                                            </button>
                                            <button onclick="event.stopPropagation(); openShopEditModal(${item.id}, ${idx})" class="p-1.5 text-slate-200 hover:text-blue-500 rounded-lg">
                                                <i data-lucide="edit-2" class="w-3.5 h-3.5"></i>
                                            </button>
                                            <button onclick="event.stopPropagation(); removeShop(${item.id}, ${idx})" class="p-1.5 text-slate-200 hover:text-rose-500 rounded-lg">
                                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                                            </button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>` : ''}
                </div>
                `; }).join('');
            
            lucide.createIcons();
            updateProgress();
            checkTextOverflow();
        }

        function checkTextOverflow() {
            items.forEach(item => {
                const el = document.getElementById(`text-${item.id}`);
                if (!el) return;
                const container = el.parentElement;
                if (el.scrollWidth > container.clientWidth) {
                    if (!el.dataset.duplicated) {
                        el.innerHTML += ` <span class="mx-4 opacity-0">|</span> ` + el.innerHTML;
                        el.dataset.duplicated = "true";
                    }
                    el.classList.add('animate-scroll');
                } else {
                    el.classList.remove('animate-scroll');
                }
            });
        }

        function toggleExpand(id) {
            const item = items.find(i => i.id === id);
            if(item && item.category === 'food') {
                expandedId = expandedId === id ? null : id;
                renderItems();
            }
        }

        function addShop(itemId) {
            const nameInput = document.getElementById(`shop-name-${itemId}`);
            const urlInput = document.getElementById(`shop-url-${itemId}`);
            const starInput = document.getElementById(`shop-star-${itemId}`);
            const resInput = document.getElementById(`shop-res-${itemId}`);

            if(!nameInput.value.trim()) return;
            
            items = items.map(i => i.id === itemId ? {
                ...i, 
                shops: [...(i.shops || []), {
                    name: nameInput.value, 
                    url: urlInput.value.trim(),
                    isStarred: starInput.checked,
                    isReserved: resInput.checked,
                    completed: false
                }]
            } : i);
            
            save(); 
            renderItems();
            nameInput.value = '';
            urlInput.value = '';
            starInput.checked = false;
            resInput.checked = false;
        }

        function toggleShopStatus(itemId, idx, key) {
            items = items.map(i => {
                if(i.id === itemId) {
                    const shops = [...i.shops];
                    shops[idx][key] = !shops[idx][key];
                    return {...i, shops};
                }
                return i;
            });
            save(); renderItems();
        }

        function openMap(url, name, spot) {
            if (url && (url.startsWith('http') || url.startsWith('https'))) {
                window.open(url, '_blank');
            } else {
                const query = encodeURIComponent(`${name} ${spot}`);
                window.open(`https://www.google.com/maps/search/?api=1&query=${query}`, '_blank');
            }
        }

        function toggleShopComplete(itemId, idx) {
            items = items.map(i => {
                if(i.id === itemId) {
                    const shops = [...i.shops];
                    shops[idx].completed = !shops[idx].completed;
                    return {...i, shops};
                }
                return i;
            });
            save(); renderItems();
        }

        function removeShop(itemId, idx) {
            if(confirm('このお店を削除しますか？')) {
                items = items.map(i => {
                    if(i.id === itemId) {
                        const shops = [...i.shops];
                        shops.splice(idx, 1);
                        return {...i, shops};
                    }
                    return i;
                });
                save(); renderItems();
            }
        }

        function toggleComplete(id) {
            items = items.map(i => i.id === id ? {...i, completed: !i.completed} : i);
            save(); renderItems();
        }

        // --- EDITING MODALS ---

        function openEditModal(id) {
            const item = items.find(i => i.id === id);
            editingItemId = id;
            document.getElementById('modal-edit-name').value = item.name;
            document.getElementById('modal-edit-spot').value = item.spot;
            document.getElementById('modal-edit-budget').value = item.budget;
            document.getElementById('modal-edit-starred').checked = item.isStarred || false;
            document.getElementById('modal-edit-reserved').checked = item.isReserved || false;
            document.getElementById('edit-modal').classList.add('show');
        }

        function closeEditModal() { document.getElementById('edit-modal').classList.remove('show'); }

        function saveModalEdit() {
            items = items.map(i => i.id === editingItemId ? {
                ...i, 
                name: document.getElementById('modal-edit-name').value, 
                spot: document.getElementById('modal-edit-spot').value, 
                budget: parseInt(document.getElementById('modal-edit-budget').value) || 0,
                isStarred: document.getElementById('modal-edit-starred').checked,
                isReserved: document.getElementById('modal-edit-reserved').checked
            } : i);
            save(); renderItems(); closeEditModal();
        }

        function openShopEditModal(itemId, shopIdx) {
            const item = items.find(i => i.id === itemId);
            const shop = item.shops[shopIdx];
            editingShopInfo = { itemId, shopIdx };
            
            document.getElementById('modal-shop-name').value = shop.name;
            document.getElementById('modal-shop-url').value = shop.url || '';
            document.getElementById('modal-shop-starred').checked = shop.isStarred || false;
            document.getElementById('modal-shop-reserved').checked = shop.isReserved || false;
            
            document.getElementById('shop-edit-modal').classList.add('show');
        }

        function closeShopEditModal() { 
            document.getElementById('shop-edit-modal').classList.remove('show'); 
            editingShopInfo = null;
        }

        function saveShopEdit() {
            if(!editingShopInfo) return;
            const { itemId, shopIdx } = editingShopInfo;
            
            items = items.map(i => {
                if(i.id === itemId) {
                    const shops = [...i.shops];
                    shops[shopIdx] = {
                        ...shops[shopIdx],
                        name: document.getElementById('modal-shop-name').value,
                        url: document.getElementById('modal-shop-url').value,
                        isStarred: document.getElementById('modal-shop-starred').checked,
                        isReserved: document.getElementById('modal-shop-reserved').checked
                    };
                    return { ...i, shops };
                }
                return i;
            });
            
            save(); renderItems(); closeShopEditModal();
        }

        function deleteItem(id) {
            if(confirm('この項目を削除しますか？')) {
                items = items.filter(i => i.id !== id);
                save(); renderItems();
            }
        }

        function updateProgress() {
            let total = 0, done = 0, budget = 0;
            items.forEach(i => {
                total++; if(i.completed) done++;
                budget += i.budget;
                (i.shops || []).forEach(s => {
                    total++; if(s.completed) done++;
                });
            });
            const p = total === 0 ? 0 : Math.round((done/total)*100);
            document.getElementById('progress-percent').innerText = p + '%';
            document.getElementById('progress-bar').style.width = p + '%';
            document.getElementById('total-budget-display').innerText = '£' + budget.toLocaleString();
        }

        function save() { localStorage.setItem('uk_wishlist_v4', JSON.stringify(items)); }

        window.onload = init;
    </script>
</body>
</html>
